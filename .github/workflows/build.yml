name: Build Solidity for Termux (All Architectures)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Solidity (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, arm, i686, x86_64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Absolutely required by build-package.sh to calculate SOURCE_DATE_EPOCH via git log

      - name: Set up QEMU (For cross-compilation execution helpers)
        uses: docker/setup-qemu-action@v3

      - name: Initialize Environment Layout & Repositories
        run: |
          mkdir -p scripts
          # Ensure properties.sh exists so 'source' commands inside build-package.sh don't crash
          touch scripts/properties.sh
          # Freshly wipe and initialize output folders to avoid cross-architecture bleeding
          rm -rf output staging_release
          mkdir -p output staging_release

      - name: Build Solidity via Termux Docker Toolchain
        run: |
          # Define system hooks required by build-package.sh
          export TERMUX_APP_PACKAGE="com.termux"
          export TERMUX_REPO_APP__PACKAGE_NAME="com.termux"
          export TERMUX_PACKAGES_DIRECTORIES="packages"

          # Isolate the container names to completely rule out host runner environment overlaps
          export CONTAINER_NAME="termux-builder-${{ matrix.arch }}"

          # CRITICAL REPAIR: Added the '-i' flag.
          # This tells build-package.sh to fetch pre-compiled .deb dependencies (like boost/libc++)
          # from the URLs defined in repo.json instead of looking for source folders.
          ./scripts/run-docker.sh ./build-package.sh -i -a ${{ matrix.arch }} solidity

      - name: Locate and Verify Native .deb Packages
        id: locate_deb
        run: |
          # Scan the output tracking folder generated by the compilation scripts
          if [ -d "output" ] && [ "$(ls output/*.deb 2>/dev/null)" ]; then
            echo "Success! Found compiled Debian packages for ${{ matrix.arch }}:"
            ls -la output/*.deb

            # Copy the packages safely to a clean production staging directory
            cp output/*.deb staging_release/
            echo "DEB_EXISTS=true" >> $GITHUB_ENV
          else
            echo "ERROR: The Termux build chain did not produce any .deb files for ${{ matrix.arch }}!" && exit 1
          fi

      - name: Upload Native .deb Package to GitHub Release
        uses: softprops/action-gh-release@v2
        if: env.DEB_EXISTS == 'true' && startsWith(github.ref, 'refs/tags/')
        with:
          files: staging_release/*.deb
          append_body: true # Ensures parallel matrix jobs safely append their logs/notes instead of wiping them out
          body: |
            Automated compilation of native Solidity compilers (`.deb`) for Termux.

            ### How to install:
            Download the specific package file matching your device architecture, then execute:
            ```bash
            dpkg -i <package_name>.deb
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

